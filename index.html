<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temporality</title>

    <link rel="stylesheet" href="src/css/styles.css">

    <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap');
    </style>
</head>
<body>
    <div id="resources-div" class="resources-div">

    </div>
    <div class="overline">

    </div>

    <div id="save-btn" class="save-btn hover" onclick="save_btn_pressed()">
        <h2>Save</h2>
    </div>
    <div id="copy-save-btn" class="copy-save-btn hover" onclick="copySave()">
        <h2>Copy save</h2>
    </div>
    <div id="load-save-btn" class="load-save-btn hover" onclick="loadFromString()">
        <h2>Load from clipboard</h2>
    </div>
    <div id="clear-save-btn" class="clear-save-btn hover" onclick="clearSave_btn_pressed()">
        <h2>Clear save</h2>
    </div>

    <div id="github-page-btn" class="github-page-btn hover" onclick="window.open('https://github.com/Skept1cal/Temporality-public', '_blank', 'noopener noreferrer')">
        <h2>Open Github page</h2>
    </div>

    <div id="max-all-btn" class="max-all hover" onclick="pre_m_maxall()">
        <h2>Max all (M)</h2>
    </div>
    <div id="compress-all-btn" class="compress-all hover" onclick="pre_m_compressall()">
        <h2>Compress all (C)</h2>
    </div>
    <div class="main-container">
        <div id="buy1-buttons-div" class="buy1-buttons">

        </div>
        <div id="buymax-buttons-div" class="buymax-buttons">

        </div>
        <div id="dilator-costs-div" class="dilator-costs">

        </div>
        <div id="dilators-div" class="dilators">

        </div>
        <div id="dilator-amounts-div" class="dilator-amounts">

        </div>
        <div id="compress-buttons-div" class="compress-buttons">

        </div>
    </div>

    <script src="src/js/helpers.js"></script>
    <script src="src/js/format.js"></script>
    <script src="src/js/objects.js"></script>
    <script src="src/js/pre_m.js"></script>
    <script src="src/html/setup.js"></script>
    <script src="src/css/conditionals.js"></script>
    <script src="src/html/update.js"></script>
    <script src="src/js/buymax.js"></script>
    <script src="src/js/save.js"></script>
    <script src="src/js/main.js"></script>
</body>
</html>
